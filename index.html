<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T WORD STAGE-</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav id="game-nav">
        <button id="nav-home-btn" class="nav-btn active">🎮 PLAY</button>
        <button id="nav-list-btn" class="nav-btn">📋 WORD LIST</button>
    </nav>

    <div id="select-screen" class="view-section">
        <h1>WORD STAGE</h1>
        <div class="subtitle">SELECT YOUR MISSION</div>
        
        <div class="select-box-container">
            <label for="stage-select">MISSION TARGET:</label>
            <select id="stage-select">
                <option value="words_0616.json">📅 6月16日 単語テスト</option>
                <option value="words_0623.json">📅 6月23日 単語テスト</option>
                <option value="words_important.json">🔥 期末向け重要単語</option>
            </select>
        </div>

        <div class="mode-container">
            <button class="btn-mode" id="btn-all-mode">
                <span class="mode-title">ALL WORDS STAGE</span>
                <span class="mode-desc">選んだ範囲の全フレーズを完答する</span>
            </button>
            <button class="btn-mode" id="btn-fav-mode">
                <span class="mode-title">FAVORITE STAGE</span>
                <span class="mode-desc">選んだ範囲の（★）だけで完答特訓する</span>
            </button>
        </div>
    </div>

    <div id="game-screen" class="view-section" style="display: none;">
        <h1>WORD STAGE</h1>
        <div class="subtitle">TYPE THE FULL PHRASE</div>
        <div id="progress-container">STAGE: <span id="current-q">1</span> / <span id="total-q">0</span></div>

        <div id="card">
            <button id="btn-fav">★</button>
            <div class="display-container">
                <div id="meaning-display">LOADING...</div>
                <div id="review-container" style="display: none;">
                    <div id="review-status"></div>
                    <div class="review-line">正解: <span id="review-correct"></span></div>
                    <div class="review-line">あなたの入力: <span id="review-user"></span></div>
                </div>
            </div>
            <div id="judge-overlay"></div>
        </div>

        <form id="answer-form">
            <input type="text" id="user-input" autocomplete="off" placeholder="フレーズをまるごと入力..." autofocus>
            <button type="submit" id="btn-submit">ENTER</button>
        </form>
    </div>

    <div id="result-screen" class="view-section" style="display: none;">
        <h1>STAGE CLEAR</h1>
        <div class="subtitle">あなたのリザルト</div>
        <div class="rank-display" id="rank">--</div>
        <p class="score-text">正答率: <span id="accuracy">0</span>% (<span id="correct-count">0</span>/<span id="total-count">0</span>)</p>
        <button id="btn-retry" onclick="backToTitle()">BACK TO TITLE</button>
    </div>

    <div id="list-screen" class="view-section" style="display: none;">
        <h1>WORD LIST</h1>
        <div class="subtitle">MANAGE YOUR FAVORITES</div>
        
        <div class="select-box-container">
            <label for="stage-select">MISSION TARGET:</label>
            <select id="stage-select">
                </select>
        </div>

        <div class="select-box-container">
            <select id="list-stage-select">
                </select>
        </div>

        <div id="word-list-container">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
